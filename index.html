<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {theme:{extend:{colors:{ungu:{utama:'#6B21A8',terang:'#A855F7'}}}}}
    </script>
    <style>body{background:linear-gradient(135deg,#050505 0%,#1A102E 40%,#4C1D95 100%);min-height:100vh;}</style>
</head>
<body class="text-white font-sans">
    <header class="bg-black/40 backdrop-blur-md py-4 px-4 sticky top-0 z-30">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-ungu-terang">⚡ Xdnry777</div>
            <div class="flex items-center gap-2">
                <span id="nama" class="text-sm hidden sm:block"></span>
                <button onclick="keluar()" class="text-sm bg-red-600 px-3 py-1 rounded-full">Keluar</button>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-12 text-center">
        <h1 class="text-3xl font-bold mb-3">Top Up Game Tercepat</h1>
        <p class="text-gray-400 mb-8">Harga Murah & Terpercaya</p>
        <a href="pilih-game.html" class="inline-block bg-ungu-utama hover:bg-ungu-terang px-8 py-4 rounded-xl text-xl font-bold">
            Mulai Top Up <i class="fa fa-arrow-right ml-2"></i>
        </a>
    </main>

    <script>
        document.getElementById('nama').textContent=localStorage.getItem('namaPengguna')||'Pengguna';
        function keluar(){
            if(confirm('Yakin keluar?')){
                localStorage.removeItem('namaPengguna');localStorage.removeItem('sudahLogin');
                window.location.href='login.html';
            }
        }
    </script>
</body>
</html>
