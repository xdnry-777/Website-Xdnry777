<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {theme:{extend:{colors:{ungu:{utama:'#6B21A8',terang:'#A855F7'}}}}}
    </script>
    <style>
        body{background:linear-gradient(180deg,#050505 0%,#1A102E 40%,#4C1D95 100%);min-height:100vh;}
    </style>
</head>
<body class="text-white font-sans flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-ungu-terang">⚡ Xdnry777</h1>
            <p class="text-gray-300 mt-2">Masuk untuk mulai top up</p>
        </div>

        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/10">
            <label class="block mb-2 font-medium">Nama Kamu</label>
            <input type="text" id="nama" placeholder="Masukkan nama kamu" class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-ungu-terang mb-4" required>

            <button onclick="login()" class="w-full bg-ungu-utama hover:bg-ungu-terang py-3 rounded-xl font-bold text-lg transition-all">
                Masuk
            </button>
        </div>
    </div>

    <script>
        function login(){
            const nama = document.getElementById('nama').value.trim();
            if(nama.length < 2){
                alert('⚠️ Nama minimal 2 huruf!');
                return;
            }
            localStorage.setItem('namaPengguna', nama);
            localStorage.setItem('sudahLogin', 'ya');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
