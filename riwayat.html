<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ungu: { utama:'#6B21A8', terang:'#A855F7' } } } } }
    </script>
    <style>.bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); } .bg-card { background: linear-gradient(145deg, rgba(107,33,168,0.2), rgba(45,12,94,0.3)); }</style>
</head>
<body class="bg-gradasi min-h-screen font-sans text-white">
    <div id="menuSamping" class="-translate-x-full fixed top-0 left-0 h-full w-72 bg-gray-900/98 backdrop-blur-md z-[60] transition-transform duration-300 border-r border-ungu-utama/30">
        <div class="p-4 h-full flex flex-col">
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-ungu-utama/30">
                <span class="text-xl font-bold text-ungu-terang">⚡ Xdnry777</span>
                <button onclick="tutupMenu()" class="text-xl"><i class="fa fa-times"></i></button>
            </div>
            <div class="menu-user mb-4"></div>
            <nav class="flex-1 space-y-2">
                <a href="index.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-ungu-utama/30"><i class="fa fa-home w-5"></i> Beranda</a>
                <a href="pilih-game.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-ungu-utama/30"><i class="fa fa-gamepad w-5"></i> Top Up Game</a>
                <a href="riwayat.html" class="flex items-center gap-3 p-3 rounded-lg bg-ungu-utama/30"><i class="fa fa-history w-5"></i> Riwayat Pesanan</a>
                <a href="bantuan.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-ungu-utama/30"><i class="fa fa-question-circle w-5"></i> Bantuan</a>
                <a href="syarat.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-ungu-utama/30"><i class="fa fa-file-text w-5"></i> Syarat & Ketentuan</a>
            </nav>
            <div class="mt-auto pt-4 border-t border-ungu-utama/30 text-center text-sm text-gray-400">© 2026 Xdnry777</div>
        </div>
    </div>
    <div onclick="tutupMenu()" class="hidden fixed inset-0 bg-black/50 z-50" id="lapisanTutup"></div>

    <nav class="backdrop-blur-md bg-black/30 sticky top-0 z-40 border-b border-ungu-utama/30">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <button onclick="bukaMenu()" class="text-2xl"><i class="fa fa-bars"></i></button>
            <div class="area-user"></div>
        </div>
    </nav>

    <section class="container mx-auto px-4 py-10">
        <a href="index.html" class="inline-flex items-center text-ungu-terang mb-6"><i class="fa fa-arrow-left mr-2"></i>Kembali</a>
        <h1 class="text-2xl font-bold mb-6 text-center">Riwayat Pesanan</h1>

        <div id="daftarRiwayat" class="space-y-4 max-w-lg mx-auto"></div>
        <div id="kosong" class="text-center text-gray-400 mt-10">
            <i class="fa fa-inbox text-5xl mb-4"></i>
            <p>Belum ada riwayat pesanan</p>
            <a href="pilih-game.html" class="inline-block mt-4 text-ungu-terang">Yuk beli sekarang!</a>
        </div>
    </section>

    <script src="auth.js"></script>
    <script>
        function tampilRiwayat() {
            const daftar = document.getElementById('daftarRiwayat');
            const kosong = document.getElementById('kosong');
            let riwayat = JSON.parse(localStorage.getItem('riwayatPesanan') || '[]');
            if (riwayat.length === 0) { daftar.innerHTML = ''; kosong.classList.remove('hidden'); return; }
            kosong.classList.add('hidden'); daftar.innerHTML = '';
            riwayat.forEach(pesanan => {
                const kartu = document.createElement('div');
                kartu.className = 'bg-card rounded-xl p-5 border border-ungu-utama/40';
                kartu.innerHTML = `<div class="flex justify-between items-start mb-3"><h3 class="font-bold text-ungu-terang">${pesanan.namaGame}</h3><span class="text-xs bg-green-600 px-2 py-0.5 rounded">Berhasil</span></div><p class="text-sm text-gray-300">Item: ${pesanan.item}</p><p class="text-sm text-gray-300">ID: ${pesanan.id} | Nick: ${pesanan.nickname}</p><p class="text-sm text-gray-400 mt-2">Metode: ${pesanan.metode}</p><p class="font-bold text-lg mt-2">Rp ${pesanan.total}</p><p class="text-xs text-gray-500 mt-2">${pesanan.waktu}</p>`;
                daftar.appendChild(kartu);
            });
        }
        document.addEventListener('DOMContentLoaded', tampilRiwayat);
    </script>
</body>
</html>
