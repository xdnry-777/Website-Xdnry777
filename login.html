<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ungu: { utama:'#6B21A8', terang:'#A855F7' } } } } }
    </script>
    <style>.bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); } .tab-aktif { background: #6B21A8; color: white; } .tab-non { background: #1f2937; color: #9ca3af; }</style>
</head>
<body class="bg-gradasi min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-md bg-white/95 rounded-xl p-6 shadow-2xl">
        <div class="text-center mb-6">
            <div class="text-3xl font-bold text-ungu-utama">⚡ Xdnry777</div>
            <p class="text-gray-500 mt-2">Silakan Masuk Akun</p>
        </div>

        <!-- Tab Pilihan Login -->
        <div class="flex mb-6 rounded-lg overflow-hidden">
            <button onclick="bukaTab('google')" id="tabGoogle" class="flex-1 py-3 font-bold tab-aktif">Google</button>
            <button onclick="bukaTab('manual')" id="tabManual" class="flex-1 py-3 font-bold tab-non">Manual</button>
        </div>

        <!-- Form Login Google (Firebase Asli) -->
        <div id="formGoogle">
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center border border-gray-300 rounded-lg py-3 px-4 hover:bg-gray-50 transition mb-4">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3">
                <span class="font-medium text-gray-700">Pilih Akun Google</span>
            </button>
        </div>

        <!-- Form Login Manual -->
        <div id="formManual" class="hidden space-y-4">
            <div>
                <label class="text-sm text-gray-600 mb-1 block">Username / Email</label>
                <input type="text" id="loginUser" class="w-full border border-gray-300 rounded-lg px-3 py-3" placeholder="Masukkan username/email">
            </div>
            <div>
                <label class="text-sm text-gray-600 mb-1 block">Kata Sandi</label>
                <input type="password" id="loginPass" class="w-full border border-gray-300 rounded-lg px-3 py-3" placeholder="Masukkan kata sandi">
            </div>
            <button onclick="cekLoginManual()" class="w-full bg-ungu-utama text-white py-3 rounded-lg font-bold">Masuk</button>
        </div>

        <div class="text-center mt-5">
            <p class="text-gray-600">Belum punya akun? <a href="daftar.html" class="text-ungu-utama font-bold">Daftar Sekarang</a></p>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-ungu-utama"><i class="fa fa-arrow-left mr-1"></i>Kembali</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        // ==============================================
        const firebaseConfig = {
  apiKey: "AIzaSyDd4gqKYDZBJ9UVO94SD-sJmmxmV6C6alE",
  authDomain: "xdnry777-efc70.firebaseapp.com",
  projectId: "xdnry777-efc70",
  storageBucket: "xdnry777-efc70.firebasestorage.app",
  messagingSenderId: "556638960997",
  appId: "1:556638960997:web:f726355f744b69ddf5758c",
  measurementId: "G-GXKXVYQFBM"
};
        // ==============================================

        firebase.initializeApp(firebaseConfig);

        function bukaTab(jenis) {
            document.getElementById('formGoogle').classList.toggle('hidden', jenis !== 'google');
            document.getElementById('formManual').classList.toggle('hidden', jenis !== 'manual');
            document.getElementById('tabGoogle').className = `flex-1 py-3 font-bold ${jenis === 'google' ? 'tab-aktif' : 'tab-non'}`;
            document.getElementById('tabManual').className = `flex-1 py-3 font-bold ${jenis === 'manual' ? 'tab-aktif' : 'tab-non'}`;
        }

        // Fungsi Login Google Asli Firebase
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
            .then((hasil) => {
                const user = hasil.user;
                setLogin(user.displayName, user.email);
                alert('✅ Berhasil Masuk! Selamat Datang ' + user.displayName);
                window.location.href = 'pilih-game.html';
            })
            .catch((error) => {
                alert('❌ Gagal Masuk: ' + error.message);
            });
        }

        // Login Manual
        function cekLoginManual() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!user || !pass) return alert('⚠️ Lengkapi semua data!');

            const akun = cekAkun(user, pass);
            if (akun) {
                setLogin(akun.nama, akun.email);
                alert('✅ Berhasil Masuk! Selamat Datang ' + akun.nama);
                window.location.href = 'pilih-game.html';
            } else {
                alert('❌ Username/Email atau Kata Sandi salah!');
            }
        }
    </script>
</body>
</html>
