<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Game - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {theme:{extend:{colors:{ungu:{utama:'#6B21A8',terang:'#A855F7'}}}}}
    </script>
    <style>
        body{background:linear-gradient(135deg,#050505 0%,#1A102E 40%,#4C1D95 100%);min-height:100vh;}
        .kartu-game:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(168,85,247,0.3);}
        .kartu-game{transition:all 0.3s ease;cursor:pointer;}
    </style>
</head>
<body class="text-white font-sans">
    <script>if(!localStorage.getItem('sudahLogin')){alert('⚠️ Silakan Login Dulu!');window.location.href='login.html';}</script>

    <header class="bg-black/40 backdrop-blur-md py-4 px-4 sticky top-0 z-30">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl"><i class="fa fa-arrow-left"></i></a>
            <h1 class="text-xl font-bold">Pilih Game</h1>
            <div></div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="kartu-game bg-white/10 rounded-xl p-4 text-center border border-white/10" onclick="pilihGame('Mobile Legends')">
                <div class="text-4xl mb-2">🦅</div>
                <h3 class="font-bold">Mobile Legends</h3>
                <p class="text-xs text-gray-400 mt-1">Diamond</p>
            </div>
            <div class="kartu-game bg-white/10 rounded-xl p-4 text-center border border-white/10" onclick="pilihGame('Free Fire')">
                <div class="text-4xl mb-2">🔥</div>
                <h3 class="font-bold">Free Fire</h3>
                <p class="text-xs text-gray-400 mt-1">Diamond</p>
            </div>
            <div class="kartu-game bg-white/10 rounded-xl p-4 text-center border border-white/10" onclick="pilihGame('PUBG Mobile')">
                <div class="text-4xl mb-2">🔫</div>
                <h3 class="font-bold">PUBG Mobile</h3>
                <p class="text-xs text-gray-400 mt-1">UC</p>
            </div>
            <div class="kartu-game bg-white/10 rounded-xl p-4 text-center border border-white/10" onclick="pilihGame('Genshin Impact')">
                <div class="text-4xl mb-2">⚡</div>
                <h3 class="font-bold">Genshin Impact</h3>
                <p class="text-xs text-gray-400 mt-1">Genesis Crystal</p>
            </div>
        </div>
    </main>

    <script>
        function pilihGame(namaGame){
            localStorage.setItem('gameDipilih', namaGame);
            window.location.href='pilih-item.html';
        }
    </script>
</body>
</html>
