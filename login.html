<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ungu: { utama:'#6B21A8', terang:'#A855F7' } } } } }
    </script>
    <style>.bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); }</style>
</head>
<body class="bg-gradasi min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-md bg-white/95 rounded-xl p-6 shadow-2xl">
        <div class="text-center mb-6">
            <div class="text-3xl font-bold text-ungu-utama">⚡ Xdnry777</div>
            <p class="text-gray-500 mt-2">Silakan Masuk Akun</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-600 mb-1 block">Username / Email</label>
                <input type="text" id="user" class="w-full border border-gray-300 rounded-lg px-3 py-3" placeholder="Masukkan username/email">
            </div>
            <div>
                <label class="text-sm text-gray-600 mb-1 block">Kata Sandi</label>
                <input type="password" id="pass" class="w-full border border-gray-300 rounded-lg px-3 py-3" placeholder="Masukkan kata sandi">
            </div>
            <button onclick="login()" class="w-full bg-ungu-utama text-white py-3 rounded-lg font-bold hover:opacity-90">Masuk</button>
        </div>

        <div class="text-center mt-5">
            <p class="text-gray-600">Belum punya akun? <a href="daftar.html" class="text-ungu-utama font-bold">Daftar Sekarang</a></p>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-ungu-utama"><i class="fa fa-arrow-left mr-1"></i>Kembali</a>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('user').value.trim();
            const sandi = document.getElementById('pass').value;

            if (!username || !sandi) {
                alert("⚠️ Harap isi semua kolom!");
                return;
            }

            const daftarAkun = JSON.parse(localStorage.getItem("daftarAkun") || "[]");
            const akunBenar = daftarAkun.find(a => 
                (a.nama === username || a.email === username) && a.sandi === sandi
            );

            if (akunBenar) {
                localStorage.setItem("namaPengguna", akunBenar.nama);
                localStorage.setItem("sudahLogin", "ya");
                alert("✅ Berhasil Masuk! Selamat datang " + akunBenar.nama);
                window.location.href = "pilih-game.html";
            } else {
                alert("❌ Username atau Kata Sandi salah!");
            }
        }
    </script>
</body>
</html>
