<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { ungu: { utama:'#6B21A8' } } } } }
    </script>
    <style>.bg-gradasi { background: linear-gradient(135deg, #050505 0%, #1A102E 40%, #4C1D95 100%); }</style>
</head>
<body class="bg-gradasi min-h-screen font-sans flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white/95 text-gray-800 rounded-xl p-6 shadow-2xl">
        <div class="text-center mb-4"><h2 class="text-2xl font-bold text-ungu-utama">⚡ Xdnry777</h2><p class="text-sm text-gray-500 mt-1" id="waktu"></p></div>
        <div class="bg-green-50 border border-green-200 p-3 rounded-lg text-center mb-4"><i class="fa fa-check-circle text-green-500 text-xl"></i><p class="font-semibold text-green-700">PEMBAYARAN BERHASIL</p></div>

        <div class="space-y-2 text-sm mb-4 border-b border-dashed pb-4">
            <div class="flex justify-between"><span class="text-gray-500">Game</span><span id="sNama">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">ID Akun</span><span id="sId">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Nickname</span><span id="sNick">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Item</span><span id="sItem">-</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Metode Bayar</span><span id="sMetode">-</span></div>
        </div>

        <div class="space-y-1 text-sm mb-6">
            <div class="flex justify-between"><span>Harga</span><span id="sHarga">-</span></div>
            <div class="flex justify-between"><span>Kode Unik</span><span>Rp 50</span></div>
            <div class="flex justify-between font-bold text-ungu-utama text-lg pt-2 border-t"><span>TOTAL</span><span id="sTotal">-</span></div>
        </div>

        <p class="text-center text-sm">Terima kasih! Proses 1-5 menit</p>
        <a href="index.html" class="block w-full bg-ungu-utama text-white py-3 rounded-lg text-center font-bold mt-6">Kembali ke Beranda</a>
    </div>

    <script src="auth.js"></script>
    <script>
        window.onload = function() {
            const tgl = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) + ' ' + new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) + ' WIB';
            document.getElementById('waktu').textContent = tgl;
            document.getElementById('sNama').textContent = localStorage.getItem('namaGame');
            document.getElementById('sId').textContent = localStorage.getItem('id');
            document.getElementById('sNick').textContent = localStorage.getItem('nickname');
            document.getElementById('sItem').textContent = localStorage.getItem('item');
            document.getElementById('sMetode').textContent = localStorage.getItem('metodeBayar');
            document.getElementById('sHarga').textContent = 'Rp ' + localStorage.getItem('hargaDasar');
            document.getElementById('sTotal').textContent = 'Rp ' + localStorage.getItem('totalAkhir')?.toLocaleString('id-ID');
        }
    </script>
</body>
</html>
