<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {theme:{extend:{colors:{ungu:{utama:'#6B21A8',terang:'#A855F7'}}}}}
    </script>
    <style>
        body{background:linear-gradient(135deg,#050505 0%,#1A102E 40%,#4C1D95 100%);min-height:100vh;}
        .metode-bayar:hover{border-color:#A855F7;background:rgba(168,85,247,0.1);}
        .metode-bayar{transition:all 0.2s ease;cursor:pointer;}
        .terpilih{border-color:#A855F7 !important;background:rgba(168,85,247,0.15) !important;}
    </style>
</head>
<body class="text-white font-sans">
    <script>if(!localStorage.getItem('sudahLogin')){alert('⚠️ Silakan Login Dulu!');window.location.href='login.html';}</script>

    <header class="bg-black/40 backdrop-blur-md py-4 px-4 sticky top-0 z-30">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <a href="pilih-game.html" class="text-xl"><i class="fa fa-arrow-left"></i></a>
            <h1 class="text-xl font-bold">Konfirmasi Pembayaran</h1>
            <div></div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div class="bg-white/10 rounded-xl p-5 border border-white/10 mb-6">
            <h3 class="font-bold text-lg mb-3">Rincian Pesanan</h3>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between"><span class="text-gray-400">Game</span><span id="game">-</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Item</span><span id="item">-</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Total Bayar</span><span id="total" class="text-green-400 font-bold">-</span></div>
            </div>
        </div>

        <!-- ✅ KOLOM ID GAME DIPINDAH KE SINI -->
        <div class="mb-6">
            <label class="block mb-2 font-medium">🆔 Masukkan ID Game</label>
            <input type="text" id="idGame" placeholder="Contoh: 12345678" class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-ungu-terang">
        </div>

        <h3 class="font-bold text-lg mb-3">Pilih Metode Pembayaran</h3>
        <div class="space-y-3 mb-8">
            <div class="metode-bayar border border-white/20 rounded-xl p-4 flex items-center gap-3" onclick="pilihMetode(this,'QRIS')">
                <span class="text-2xl">📱</span>
                <span class="font-medium">QRIS</span>
            </div>
            <div class="metode-bayar border border-white/20 rounded-xl p-4 flex items-center gap-3" onclick="pilihMetode(this,'DANA')">
                <span class="text-2xl">💳</span>
                <span class="font-medium">DANA</span>
            </div>
            <div class="metode-bayar border border-white/20 rounded-xl p-4 flex items-center gap-3" onclick="pilihMetode(this,'Transfer Bank')">
                <span class="text-2xl">🏦</span>
                <span class="font-medium">Transfer Bank BCA</span>
            </div>
        </div>

        <button onclick="bayar()" class="w-full bg-ungu-utama hover:bg-ungu-terang py-4 rounded-xl font-bold text-xl">
            Lanjut Bayar
        </button>
    </main>

    <script>
        document.getElementById('game').textContent = localStorage.getItem('gameDipilih');
        document.getElementById('item').textContent = localStorage.getItem('itemDipilih');
        document.getElementById('total').textContent = 'Rp ' + Number(localStorage.getItem('totalHarga')).toLocaleString('id-ID');

        let metodeTerpilih = null;
        function pilihMetode(el, nama){
            document.querySelectorAll('.metode-bayar').forEach(x=>x.classList.remove('terpilih'));
            el.classList.add('terpilih');
            metodeTerpilih = nama;
        }

        function bayar(){
            const id = document.getElementById('idGame').value.trim();
            if(id.length < 3){alert('⚠️ Masukkan ID Game yang benar!');return;}
            if(!metodeTerpilih){alert('⚠️ Pilih dulu metode pembayarannya!');return;}
            localStorage.setItem('idGame', id);
            localStorage.setItem('metodeBayar', metodeTerpilih);
            window.location.href='struk.html';
        }
    </script>
</body>
</html>
