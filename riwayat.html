<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {theme:{extend:{colors:{ungu:{utama:'#6B21A8',terang:'#A855F7'}}}}}
    </script>
    <style>
        body{background:linear-gradient(135deg,#050505 0%,#1A102E 40%,#4C1D95 100%);min-height:100vh;}
        .sidebar{transform:translateX(-100%);transition:0.3s ease;}
        .sidebar.buka{transform:translateX(0);}
    </style>
</head>
<body class="text-white font-sans">
    <script>if(!localStorage.getItem('sudahLogin')){alert('⚠️ Silakan Login Dulu!');window.location.href='login.html';}</script>

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-black/95 z-50 p-5">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-ungu-terang">Menu</h2>
            <button onclick="tutupMenu()" class="text-2xl">&times;</button>
        </div>
        <div class="space-y-4 text-lg">
            <a href="index.html" class="block py-2 hover:text-ungu-terang"><i class="fa fa-home mr-2"></i>Beranda</a>
            <a href="pilih-game.html" class="block py-2 hover:text-ungu-terang"><i class="fa fa-gamepad mr-2"></i>Pilih Game</a>
            <a href="riwayat.html" class="block py-2 hover:text-ungu-terang text-ungu-terang"><i class="fa fa-history mr-2"></i>Riwayat Pesanan</a>
            <a href="bantuan.html" class="block py-2 hover:text-ungu-terang"><i class="fa fa-question-circle mr-2"></i>Bantuan</a>
            <a href="syarat-ketentuan.html" class="block py-2 hover:text-ungu-terang"><i class="fa fa-file-text mr-2"></i>Syarat & Ketentuan</a>
            <hr class="border-white/10">
            <button onclick="keluar()" class="w-full text-left py-2 text-red-400 hover:text-red-300"><i class="fa fa-sign-out mr-2"></i>Keluar Akun</button>
        </div>
    </div>
    <div id="latar" onclick="tutupMenu()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <header class="bg-black/40 backdrop-blur-md py-4 px-4 sticky top-0 z-30">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <button onclick="bukaMenu()" class="text-2xl"><i class="fa fa-bars"></i></button>
            <h1 class="text-xl font-bold">Riwayat Pesanan</h1>
            <div></div>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div id="daftarRiwayat" class="space-y-3"></div>
        <div id="kosong" class="text-center py-12 text-gray-400 hidden">
            <i class="fa fa-folder-open text-4xl mb-3"></i>
            <p>Belum ada riwayat transaksi</p>
        </div>
    </main>

    <script>
        const wadah = document.getElementById('daftarRiwayat');
        const kosong = document.getElementById('kosong');
        let riwayat = JSON.parse(localStorage.getItem('riwayat') || '[]');

        if(riwayat.length === 0){
            kosong.classList.remove('hidden');
        } else {
            riwayat.reverse().forEach(item => {
                const kotak = document.createElement('div');
                kotak.className = 'bg-white/10 rounded-xl p-4 border border-white/10 cursor-pointer hover:bg-white/15';
                kotak.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold">${item.game}</span>
                        <span class="text-green-400 text-sm">Berhasil</span>
                    </div>
                    <p class="text-sm text-gray-300">${item.item} • ID: ${item.idg}</p>
                    <div class="flex justify-between mt-2 text-sm">
                        <span class="text-gray-400">${item.tanggal} ${item.jam}</span>
                        <span class="font-bold text-ungu-terang">${item.total}</span>
                    </div>
                `;
                kotak.onclick = () => bukaDetail(item);
                wadah.appendChild(kotak);
            });
        }

        function bukaDetail(data){
            localStorage.setItem('detailStruk', JSON.stringify(data));
            localStorage.removeItem('sudahLihatStruk');
            window.location.href='struk.html';
        }

        function bukaMenu(){document.getElementById('sidebar').classList.add('buka');document.getElementById('latar').classList.remove('hidden');}
        function tutupMenu(){document.getElementById('sidebar').classList.remove('buka');document.getElementById('latar').classList.add('hidden');}
        function keluar(){if(confirm('Yakin keluar?')){localStorage.clear();window.location.href='login.html';}}
    </script>
</body>
</html>
