<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk - Xdnry777</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {theme:{extend:{colors:{ungu:{utama:'#6B21A8',terang:'#A855F7'}}}}}
    </script>
    <style>body{background:linear-gradient(135deg,#050505 0%,#1A102E 40%,#4C1D95 100%);min-height:100vh;}.kertas{background:#fff;color:#333;}</style>
</head>
<body class="text-white font-sans">
    <script>if(!localStorage.getItem('sudahLogin')){alert('Silakan Login Dulu!');window.location.href='login.html';}</script>

    <header class="bg-black/40 backdrop-blur-md py-4 px-4 sticky top-0 z-30">
        <div class="max-w-lg mx-auto flex items-center">
            <a href="index.html" class="text-xl mr-4"><i class="fa fa-home"></i></a>
            <h1 class="text-xl font-bold">Bukti Pesanan</h1>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-8">
        <div class="kertas rounded-2xl p-6 shadow-xl mb-6">
            <div class="text-center border-b border-dashed pb-4 mb-4">
                <h2 class="text-2xl font-bold text-ungu-utama">⚡ Xdnry777 Store</h2>
                <p class="text-sm text-gray-500">Top Up Terpercaya</p>
                <p class="text-xs mt-2">Tanggal: <span id="tgl"></span></p>
                <p class="text-xs">No.Pesanan: <span class="font-bold" id="nopes"></span></p>
            </div>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between"><span>Game</span><span class="font-bold" id="sgame"></span></div>
                <div class="flex justify-between"><span>Item</span><span class="font-bold" id="sitem"></span></div>
                <div class="flex justify-between"><span>ID Game</span><span class="font-bold" id="sid"></span></div>
                <div class="flex justify-between"><span>Metode</span><span class="font-bold" id="smet"></span></div>
                <hr class="border-dashed my-3">
                <div class="flex justify-between text-lg font-bold text-ungu-utama"><span>TOTAL</span><span id="stotal"></span></div>
            </div>
            <div class="text-center mt-6 pt-4 border-t border-dashed">
                <p class="text-green-600 font-bold">✅ BERHASIL DIPROSES</p>
            </div>
        </div>

        <div class="space-y-3">
            <button onclick="kirimEmail()" class="w-full bg-ungu-utama hover:bg-ungu-terang py-3 rounded-xl font-bold"><i class="fa fa-envelope mr-2"></i>Kirim ke Email</button>
            <a href="index.html" class="block text-center bg-white/10 hover:bg-white/20 py-3 rounded-xl">Kembali ke Beranda</a>
        </div>
    </main>

    <script>
        const game=localStorage.getItem('gameDipilih');
        const item=localStorage.getItem('itemDipilih');
        const hrg=localStorage.getItem('totalHarga');
        const idg=localStorage.getItem('idGame');
        const met=localStorage.getItem('metodeBayar');
        const nopes='ORD'+Math.random().toString(36).substring(2,10).toUpperCase();
        const tgl=new Date().toLocaleString('id-ID');
        const total='Rp '+Number(hrg).toLocaleString('id-ID');

        document.getElementById('tgl').textContent=tgl;
        document.getElementById('nopes').textContent=nopes;
        document.getElementById('sgame').textContent=game;
        document.getElementById('sitem').textContent=item;
        document.getElementById('sid').textContent=idg;
        document.getElementById('smet').textContent=met;
        document.getElementById('stotal').textContent=total;

        // SIMPAN KE RIWAYAT
        let riwayat=JSON.parse(localStorage.getItem('riwayat')||'[]');
        riwayat.push({nopes,tgl,game,item,idg,met,total});
        localStorage.setItem('riwayat',JSON.stringify(riwayat));

        function kirimEmail(){
            const email='emailkamu@disini.com'; // GANTI EMAIL KAMU
            const subjek='Struk '+nopes+' - Xdnry777';
            const isi=`STRUK PEMBAYARAN
No: ${nopes}
Tanggal: ${tgl}

Game: ${game}
Item: ${item}
ID Game: ${idg}
Metode: ${met}
Total: ${total}

Terima Kasih!`;
            window.location.href=`mailto:${email}?subject=${encodeURIComponent(subjek)}&body=${encodeURIComponent(isi)}`;
            alert('Aplikasi email terbuka, silakan kirim!');
        }
    </script>
</body>
</html>
